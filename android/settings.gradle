plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.10.0'
}
include ':app'

def capacitorCordovaPluginsDir = new File(rootDir, 'capacitor-cordova-android-plugins')
gradle.ext.hasCapacitorCordovaAndroidPlugins = capacitorCordovaPluginsDir.exists()

if (gradle.ext.hasCapacitorCordovaAndroidPlugins) {
    include ':capacitor-cordova-android-plugins'
    project(':capacitor-cordova-android-plugins').projectDir = capacitorCordovaPluginsDir
}

apply from: 'capacitor.settings.gradle'
