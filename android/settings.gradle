plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.10.0'
}

def capacitorSettings = file('capacitor.settings.gradle')
if (!capacitorSettings.exists()) {
    throw new GradleException("Missing capacitor.settings.gradle. Run `npx cap sync android` from the project root.")
}
apply from: capacitorSettings

include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = file('capacitor-cordova-android-plugins')
